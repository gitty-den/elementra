<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0b0e1a">
  <meta name="apple-mobile-web-app-title" content="Elementra">
  <title>Elementra — Sammle. Fusioniere. Herrsche.</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="bg-layer"></div>
  <header id="topbar">
    <button id="btn-back" title="Zum Menü"></button>
    <div class="logo">ELEMEN<span>TRA</span></div>
    <div class="topbar-right">
      <div class="gold-pill">🪙 <span id="gold-display">0</span></div>
      <button id="btn-settings" title="Einstellungen">⚙️</button>
    </div>
  </header>

  <main id="screen"></main>

  <div id="overlay"></div>

  <!-- Querformat auf kleinen Geräten (Handy): Spiel ist fürs Hochformat gebaut.
       Auf Tablets ab 600 px Höhe wird das Landscape-Layout genutzt (css/style.css). -->
  <div id="rotate-hint">
    <div class="rot-icon"></div>
    <div class="rot-text">Bitte hochkant halten</div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/items.js"></script>
  <script src="js/state.js"></script>
  <script src="js/svg.js"></script>
  <script src="js/pixel.js"></script>
  <script src="js/sfx.js"></script>
  <script src="js/music.js"></script>
  <script src="js/stages.js"></script>
  <script src="js/ascension.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/bp.js"></script>
  <script src="js/net.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
